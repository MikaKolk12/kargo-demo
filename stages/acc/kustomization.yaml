apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- configmap-web1.yaml
- configmap-web2.yaml

patches:
- target:
    kind: Service
    name: kargo-demo-web1
  patch: |-
    - op: replace
      path: /spec/ports/0/nodePort
      value: 32081
- target:
    kind: Service
    name: kargo-demo-web2
  patch: |-
    - op: replace
      path: /spec/ports/0/nodePort
      value: 32084
