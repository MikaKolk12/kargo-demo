name: Apply CalVer to Prod

# Runs when Kargo promotes freight to the prod stage.
# For feature flows: reads the CalVer that was assigned at acc from the
# stage/acc manifests and applies the same tag to prod. No new tag is created.
# For hotfix flows (hotfix-* tags): no-op.

on:
  push:
    branches: ['stage/prod']

jobs:
  calver-prod:
    # Skip commits made by this workflow itself to prevent an infinite loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout stage/prod
      uses: actions/checkout@v4
      with:
        ref: stage/prod
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase owner
      id: owner
      run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Extract image tag from prod manifests
      id: extract
      run: |
        TAG=$(grep -rh "image: ghcr.io/${{ steps.owner.outputs.value }}/web1:" . \
          --include='*.yaml' 2>/dev/null \
          | head -1 \
          | sed "s|.*web1:||" \
          | tr -d ' "')
        echo "tag=$TAG" >> $GITHUB_OUTPUT

        if [[ "$TAG" == hotfix-* ]]; then
          echo "flow=hotfix" >> $GITHUB_OUTPUT
        elif [[ "$TAG" == sha-* ]]; then
          echo "flow=feature" >> $GITHUB_OUTPUT
        else
          echo "flow=unknown" >> $GITHUB_OUTPUT
        fi

    - name: Skip if hotfix or unknown
      if: steps.extract.outputs.flow != 'feature'
      run: echo "Tag is '${{ steps.extract.outputs.tag }}' — nothing to do."

    - name: Checkout stage/acc to read CalVer
      if: steps.extract.outputs.flow == 'feature'
      uses: actions/checkout@v4
      with:
        ref: stage/acc
        path: acc-branch

    - name: Read CalVer from stage/acc
      if: steps.extract.outputs.flow == 'feature'
      id: calver
      run: |
        CALVER=$(grep -rh "image: ghcr.io/${{ steps.owner.outputs.value }}/web1:" acc-branch/ \
          --include='*.yaml' 2>/dev/null \
          | head -1 \
          | sed "s|.*web1:||" \
          | tr -d ' "')

        if [[ -z "$CALVER" || "$CALVER" == sha-* || "$CALVER" == hotfix-* ]]; then
          echo "::warning::Could not read CalVer from stage/acc (got '$CALVER') — prod will keep SHA tag"
          echo "calver=" >> $GITHUB_OUTPUT
        else
          echo "calver=$CALVER" >> $GITHUB_OUTPUT
          echo "Found CalVer from acc: $CALVER"
        fi

    - name: Update prod manifests to use CalVer
      if: steps.extract.outputs.flow == 'feature' && steps.calver.outputs.calver != ''
      run: |
        OWNER="${{ steps.owner.outputs.value }}"
        SHA_TAG="${{ steps.extract.outputs.tag }}"
        CALVER="${{ steps.calver.outputs.calver }}"
        find . -name '*.yaml' -not -path './acc-branch/*' -exec \
          sed -i "s|ghcr.io/${OWNER}/web1:${SHA_TAG}|ghcr.io/${OWNER}/web1:${CALVER}|g" {} \;
        find . -name '*.yaml' -not -path './acc-branch/*' -exec \
          sed -i "s|ghcr.io/${OWNER}/web2:${SHA_TAG}|ghcr.io/${OWNER}/web2:${CALVER}|g" {} \;

    - name: Commit and push CalVer update
      if: steps.extract.outputs.flow == 'feature' && steps.calver.outputs.calver != ''
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --staged --quiet \
          || git commit -m "[calver] prod → ${{ steps.calver.outputs.calver }}"
        git push

    - name: Summary
      if: steps.extract.outputs.flow == 'feature'
      run: |
        echo "### Prod CalVer update" >> $GITHUB_STEP_SUMMARY
        echo "- **CalVer applied:** \`${{ steps.calver.outputs.calver }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **SHA tag replaced:** \`${{ steps.extract.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **No new GitHub tag created** (prod reuses acc CalVer)" >> $GITHUB_STEP_SUMMARY
