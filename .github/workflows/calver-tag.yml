name: CalVer Tag

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: 'Source image tag (sha-*)'
        required: true
        type: string

jobs:
  calver:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Set lowercase owner
      id: owner
      run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Compute CalVer
      id: calver
      run: |
        YY=$(date -u +%y)
        M=$(date -u +%-m)
        EXISTING=$(gh api \
          "repos/${{ github.repository_owner }}/kargo-demo-2/git/matching-refs/tags/${YY}.${M}." \
          --jq 'length' 2>/dev/null || echo 0)
        EXISTING=${EXISTING:-0}
        N=$((EXISTING + 1))
        echo "value=${YY}.${M}.${N}" >> $GITHUB_OUTPUT
        echo "CalVer: ${YY}.${M}.${N} (existing this month: ${EXISTING})"
      env:
        GH_TOKEN: ${{ secrets.CALVER_PAT }}

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.CALVER_PAT }}

    - name: Retag images with CalVer
      run: |
        OWNER="${{ steps.owner.outputs.value }}"
        SHA_TAG="${{ inputs.imageTag }}"
        CALVER="${{ steps.calver.outputs.value }}"
        for APP in web1 web2; do
          docker pull "ghcr.io/${OWNER}/${APP}:${SHA_TAG}"
          docker tag  "ghcr.io/${OWNER}/${APP}:${SHA_TAG}" "ghcr.io/${OWNER}/${APP}:${CALVER}"
          docker push "ghcr.io/${OWNER}/${APP}:${CALVER}"
        done

    - name: Create release tag in kargo-demo-2
      run: |
        CALVER="${{ steps.calver.outputs.value }}"
        SHORT_SHA="${{ inputs.imageTag }}"
        SHORT_SHA="${SHORT_SHA#sha-}"
        SHA=$(gh api "repos/${{ github.repository_owner }}/kargo-demo-2/commits/${SHORT_SHA}" \
          --jq '.sha')
        gh api "repos/${{ github.repository_owner }}/kargo-demo-2/git/refs" \
          --method POST \
          --field ref="refs/tags/${CALVER}" \
          --field sha="${SHA}"
        echo "Created tag ${CALVER} in kargo-demo-2 at ${SHA} (from image tag ${{ inputs.imageTag }})"
      env:
        GH_TOKEN: ${{ secrets.CALVER_PAT }}
