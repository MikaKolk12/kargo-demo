apiVersion: apps/v1
kind: Deployment
metadata:
  name: kargo-demo-web2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kargo-demo-web2
  template:
    metadata:
      labels:
        app: kargo-demo-web2
    spec:
      containers:
      - name: nginx
        image: ghcr.io/mikakolk12/web2
        volumeMounts:
        - name: content
          mountPath: /usr/share/nginx/html
          readOnly: true
      volumes:
      - name: content
        configMap:
          name: kargo-demo-web2-content
